<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статья — emostrEngineering</title>
    <link rel="stylesheet" href="../../css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="../../js/article.js" defer></script>
    <style>
        .article-layout {
            padding: 60px 0 80px 0
        }

        .article-hero {
            margin-bottom: 40px
        }

        .article-divider {
            border: none;
            border-top: 1px solid #1a1a1a;
            margin-top: 32px
        }

        .article-grid {
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 48px;
            align-items: start
        }

        .article-breadcrumb {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
            transition: color 0.2s
        }

        .article-breadcrumb:hover {
            color: #fff
        }

        .article-tag {
            display: inline-block;
            background: #1a1a1a;
            color: #e8a020;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 4px;
            margin-bottom: 14px
        }

        #article-hero h1 {
            font-size: 2.2rem;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 12px
        }

        .article-meta {
            font-size: 0.85rem;
            color: #555;
            margin-top: 8px
        }

        .article-body {
            max-width: 680px
        }

        .article-body p {
            font-size: 1rem;
            color: #d0d0d0;
            line-height: 1.8;
            margin-bottom: 20px
        }

        .article-body h2 {
            font-size: 1.4rem;
            color: #fff;
            margin: 40px 0 16px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #1a1a1a
        }

        .article-body h3 {
            font-size: 1.1rem;
            color: #fff;
            margin: 28px 0 12px 0
        }

        .article-body ul,
        .article-body ol {
            color: #d0d0d0;
            padding-left: 20px;
            line-height: 1.8;
            margin-bottom: 20px
        }

        .article-body li::marker {
            color: #e8a020
        }

        .article-body a {
            color: #e8a020;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s
        }

        .article-body a:hover {
            border-bottom-color: #e8a020
        }

        .table-wrap {
            overflow-x: auto;
            margin-bottom: 24px
        }

        .article-body table {
            width: 100%;
            border-collapse: collapse
        }

        .article-body thead tr {
            background: #111;
            border-bottom: 2px solid #e8a020
        }

        .article-body th {
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left
        }

        .article-body td {
            padding: 10px 14px;
            font-size: 0.9rem;
            color: #d0d0d0;
            border-bottom: 1px solid #1a1a1a
        }

        .article-body tr:nth-child(even) td {
            background: #0d0d0d
        }

        .article-body tr:hover td {
            background: #151515
        }

        .article-body pre {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-left: 3px solid #e8a020;
            border-radius: 6px;
            padding: 16px 20px;
            margin-bottom: 24px;
            overflow-x: auto
        }

        .article-body code {
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            color: #d0d0d0;
            line-height: 1.6
        }

        .article-body p code {
            background: #111;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.85rem
        }

        .article-body blockquote {
            margin: 0 0 20px 0;
            padding: 16px 20px;
            border-radius: 6px
        }

        .blockquote-warning {
            background: #1a0e00;
            border: 1px solid #7a4400;
            border-left: 4px solid #e8a020
        }

        .blockquote-warning .bq-title {
            color: #e8a020
        }

        .blockquote-warning p {
            color: #c8a060 !important
        }

        .blockquote-tip {
            background: #001a0e;
            border: 1px solid #004d2a;
            border-left: 4px solid #39a845
        }

        .blockquote-tip .bq-title {
            color: #39a845
        }

        .blockquote-tip p {
            color: #70c080 !important
        }

        .blockquote-danger {
            background: #1a0000;
            border: 1px solid #7a0000;
            border-left: 4px solid #cc3333
        }

        .blockquote-danger .bq-title {
            color: #cc3333
        }

        .blockquote-danger p {
            color: #c06060 !important
        }

        .bq-title {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 6px
        }

        .article-sidebar {
            position: sticky;
            top: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px
        }

        .sidebar-toc {
            background: #111;
            border: 1px solid #222;
            border-radius: 6px;
            padding: 20px
        }

        .sidebar-label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px
        }

        #article-toc a {
            display: block;
            font-size: 0.85rem;
            color: #888;
            line-height: 2;
            text-decoration: none;
            transition: color 0.2s
        }

        #article-toc a:hover {
            color: #fff
        }

        #article-toc a.active {
            color: #e8a020
        }

        .sidebar-calc {
            background: #111;
            border: 1px solid #e8a020;
            border-radius: 6px;
            padding: 20px
        }

        .sidebar-calc .sidebar-label {
            margin-bottom: 10px
        }

        .sidebar-calc-title {
            font-size: 1rem;
            color: #fff;
            font-weight: bold;
            margin-bottom: 6px
        }

        .sidebar-calc-desc {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 14px
        }

        .sidebar-calc-btn {
            display: block;
            width: 100%;
            background: #e8a020;
            color: #000;
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 6px;
            font-family: inherit;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.3s;
            box-sizing: border-box
        }

        .sidebar-calc-btn:hover {
            background: #f0b030
        }


        .calc-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            background: #111;
            border: 1px solid #e8a020;
            border-radius: 6px;
            padding: 24px;
            margin-top: 48px
        }

        .calc-banner-text h3 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 6px
        }

        .calc-banner-text p {
            font-size: 0.85rem;
            color: #888;
            margin: 0
        }

        .calc-banner-btn {
            display: inline-block;
            background: #e8a020;
            color: #000;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 6px;
            white-space: nowrap;
            font-family: inherit;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s
        }

        .calc-banner-btn:hover {
            background: #f0b030
        }

        @media (max-width: 900px) {
            .article-grid {
                grid-template-columns: 1fr
            }

            .sidebar-toc {
                display: none
            }

            #article-hero h1 {
                font-size: 1.8rem
            }

            .calc-banner {
                flex-direction: column;
                text-align: center
            }

            .calc-banner-btn {
                width: 100%;
                text-align: center
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container header-inner">
            <a href="/" class="logo">
                <img src="../../assets/pics/logo.png" height="60" alt="emostrEngineering">
            </a>
            <nav>
                <a href="/calc/" class="nav-link">Калькуляторы</a>
                <a href="/articles/" class="nav-link nav-link--active">Статьи</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container article-layout">

            <div class="article-hero">
                <div id="article-hero"></div>
                <div class="article-divider"></div>
            </div>

            <div class="article-grid">
                <article id="article-content" class="article-body"></article>
                <aside class="article-sidebar">
                    <div class="sidebar-toc">
                        <div class="sidebar-label">Содержание</div>
                        <div id="article-toc"></div>
                    </div>
                    <div id="sidebar-calc" class="sidebar-calc"></div>
                </aside>
            </div>

            <div id="article-calc-banner"></div>

        </div>
    </main>

    <footer>
        <div class="container footer-inner">
            <span class="footer-copy">&copy; 2025&ndash;2026 emostrEngineering</span>
            <a href="mailto:contact@emostr.com" class="footer-link">contact@emostr.com</a>
            <a href="https://emostr.com" class="footer-link" target="_blank" rel="noopener">emostr.com</a>
        </div>
    </footer>

</body>

</html>
